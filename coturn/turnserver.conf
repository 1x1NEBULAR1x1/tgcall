# Минимальный конфиг coturn для WebRTC
# Запуск: /tmp/coturn/bin/turnserver -c turnserver.conf

listening-port=3478
tls-listening-port=5349

# Слушать на всех интерфейсах
listening-ip=0.0.0.0

# Long-term credentials (логин:пароль)
lt-cred-mech
user=turn:turn1234

# Realm для аутентификации
realm=localhost
